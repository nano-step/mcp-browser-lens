<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" fill="none">
  <style>
    .box{rx:12;stroke-width:2}
    .label{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#fafafa;font-size:13px;font-weight:600;text-anchor:middle}
    .sublabel{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;fill:#a1a1aa;font-size:10px;text-anchor:middle}
    .arrow{stroke-width:2.5;stroke-linecap:round;marker-end:url(#ah)}
    .protocol{font-family:'SF Mono',Monaco,Consolas,monospace;fill:#71717a;font-size:10px;text-anchor:middle;font-weight:500}
  </style>
  <defs>
    <linearGradient id="gp" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#8b5cf6"/><stop offset="100%" stop-color="#7c3aed"/></linearGradient>
    <linearGradient id="gc" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#06b6d4"/><stop offset="100%" stop-color="#0891b2"/></linearGradient>
    <linearGradient id="gg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#16a34a"/></linearGradient>
    <marker id="ah" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0 0L8 3L0 6Z" fill="#6b7280"/></marker>
  </defs>

  <rect x="0" y="0" width="900" height="320" rx="16" fill="#09090b" stroke="#27272a" stroke-width="1"/>

  <!-- Browser Box -->
  <rect x="30" y="40" width="200" height="240" class="box" fill="#18181b" stroke="#8b5cf644"/>
  <rect x="30" y="40" width="200" height="36" rx="12" fill="url(#gp)" opacity="0.15"/>
  <text x="130" y="63" class="label" fill="#c4b5fd">Browser</text>
  <text x="130" y="95" class="sublabel">Bookmarklet captures:</text>
  <text x="130" y="115" class="sublabel">DOM tree + semantics</text>
  <text x="130" y="133" class="sublabel">Computed CSS styles</text>
  <text x="130" y="151" class="sublabel">Box model + flex/grid</text>
  <text x="130" y="169" class="sublabel">Typography + colors</text>
  <text x="130" y="187" class="sublabel">Screenshots (PNG)</text>
  <text x="130" y="205" class="sublabel">Accessibility audit</text>
  <text x="130" y="223" class="sublabel">Responsive info</text>
  <text x="130" y="241" class="sublabel">DOM mutations</text>
  <text x="130" y="265" class="sublabel" fill="#22c55e">Zero code changes</text>

  <!-- Arrow: Browser → MCP -->
  <line x1="230" y1="130" x2="330" y2="130" class="arrow" stroke="#6b7280"/>
  <text x="280" y="120" class="protocol">WebSocket</text>
  <text x="280" y="135" class="protocol" fill="#8b5cf6">:3203</text>
  <line x1="230" y1="200" x2="330" y2="200" class="arrow" stroke="#6b7280"/>
  <text x="280" y="190" class="protocol">HTTP POST</text>
  <text x="280" y="205" class="protocol" fill="#8b5cf6">:3202</text>

  <!-- MCP Server Box -->
  <rect x="330" y="40" width="240" height="240" class="box" fill="#18181b" stroke="#06b6d444"/>
  <rect x="330" y="40" width="240" height="36" rx="12" fill="url(#gc)" opacity="0.15"/>
  <text x="450" y="63" class="label" fill="#67e8f9">Browser Lens MCP</text>
  <text x="450" y="95" class="sublabel">BrowserStore (file-backed)</text>
  <rect x="355" y="108" width="190" height="1" fill="#27272a"/>
  <text x="450" y="128" class="sublabel">DOM + Style store</text>
  <text x="450" y="146" class="sublabel">Layout + Screenshot store</text>
  <text x="450" y="164" class="sublabel">Comparison engine</text>
  <rect x="355" y="175" width="190" height="1" fill="#27272a"/>
  <text x="450" y="195" class="sublabel" fill="#f59e0b">22 Tools</text>
  <text x="450" y="213" class="sublabel" fill="#f59e0b">12 Resources</text>
  <text x="450" y="231" class="sublabel" fill="#f59e0b">5 AI Prompts</text>
  <text x="450" y="265" class="sublabel" fill="#a1a1aa">npx mcp-browser-lens</text>

  <!-- Arrow: MCP → IDE -->
  <line x1="570" y1="160" x2="640" y2="160" class="arrow" stroke="#6b7280"/>
  <path d="M640 160L570 160" class="arrow" stroke="#6b7280" marker-end="none" marker-start="url(#ah)" transform="rotate(180,605,160)"/>
  <text x="605" y="145" class="protocol">stdio</text>
  <text x="605" y="175" class="protocol" fill="#22c55e">bidirectional</text>

  <!-- IDE Box -->
  <rect x="640" y="40" width="230" height="240" class="box" fill="#18181b" stroke="#22c55e44"/>
  <rect x="640" y="40" width="230" height="36" rx="12" fill="url(#gg)" opacity="0.15"/>
  <text x="755" y="63" class="label" fill="#86efac">IDE AI Agent</text>
  <text x="755" y="95" class="sublabel">Queries tools for:</text>
  <text x="755" y="115" class="sublabel">DOM inspection</text>
  <text x="755" y="133" class="sublabel">CSS analysis</text>
  <text x="755" y="151" class="sublabel">Layout debugging</text>
  <text x="755" y="169" class="sublabel">Screenshot capture</text>
  <text x="755" y="187" class="sublabel" fill="#c4b5fd">Figma comparison</text>
  <text x="755" y="205" class="sublabel">Accessibility audit</text>
  <rect x="665" y="220" width="180" height="1" fill="#27272a"/>
  <text x="755" y="240" class="sublabel" fill="#71717a">Cursor · VSCode · Claude Code</text>
  <text x="755" y="258" class="sublabel" fill="#71717a">Windsurf · Antigravity · OpenCode</text>
</svg>
